<div class="about-hero">
  <div class="about-hero-left">
    <img class="about-avatar" src="{{ .Get "image" | relURL }}" alt="profile">
  </div>

  <div class="about-hero-right">
    <h1 class="about-name">{{ .Get "name" }}</h1>
    <div class="about-role">{{ .Get "role" }}</div>
    <div class="about-location">{{ .Get "location" }}</div>

    <div class="about-social">
      {{ with .Get "github" }}<a href="{{ . }}">GH</a>{{ end }}
      {{ with .Get "linkedin" }}<a href="{{ . }}">in</a>{{ end }}
      {{ with .Get "email" }}<a href="mailto:{{ . }}">@</a>{{ end }}
    </div>
  </div>
</div>

<div class="about-bio">
  {{ .Inner }}
</div>

<div class="about-actions">
  {{ with .Get "resume" }}
    <a class="btn-primary" href="{{ . | relURL }}">Download resume</a>
  {{ end }}
  <a class="btn-secondary" href="/docs/">View projects</a>
</div>
