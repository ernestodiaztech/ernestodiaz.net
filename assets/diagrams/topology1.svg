<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 800" width="500" height="800" role="img" aria-label="Network topology: Internet, two WAN routers, firewall, two spine switches, two leaf switches, and two hosts.">
  <defs>
    <style><![CDATA[
      svg {
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif;
      }
      .frame { fill: var(--lab-surface-subtle); stroke: var(--lab-border); stroke-width: 1; }
      .device { fill: var(--lab-bg); stroke: var(--lab-border); stroke-width: 1.5; }
      .icon-stroke { stroke: var(--lab-text-muted); fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
      .icon-accent { stroke: var(--lab-accent); fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
      .accent-fill { fill: var(--lab-accent); }
      .link { stroke: var(--lab-border); stroke-width: 1.25; fill: none; stroke-linecap: round; }
      .label { fill: var(--lab-text); font-size: 12px; font-weight: 500; text-anchor: middle; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
      .header { fill: var(--lab-text-muted); font-size: 10px; font-weight: 700; letter-spacing: 0.16em; text-anchor: middle; }
    ]]></style>
  </defs>

  <!-- Outer container -->
  <rect class="frame" x="0.5" y="0.5" width="499" height="799" rx="18" ry="18"/>

  <!-- ========== CONNECTIONS (back layer) ========== -->
  <g>
    <!-- Internet -> WANs -->
    <path class="link" d="M 250,55 Q 180,100 110,165"/>
    <path class="link" d="M 250,55 Q 320,100 390,165"/>

    <!-- WANs -> FW -->
    <path class="link" d="M 110,175 L 250,285"/>
    <path class="link" d="M 390,175 L 250,285"/>

    <!-- FW -> Spines -->
    <path class="link" d="M 250,295 L 110,415"/>
    <path class="link" d="M 250,295 L 390,415"/>

    <!-- Spine <-> Spine -->
    <path class="link" d="M 142,420 L 358,420"/>

    <!-- Spine -> Leaf full mesh -->
    <path class="link" d="M 110,425 L 110,555"/>
    <path class="link" d="M 110,425 L 390,555"/>
    <path class="link" d="M 390,425 L 110,555"/>
    <path class="link" d="M 390,425 L 390,555"/>

    <!-- Leaf -> Host -->
    <path class="link" d="M 110,565 L 110,705"/>
    <path class="link" d="M 390,565 L 390,705"/>
  </g>

  <!-- ========== INTERNET ========== -->
  <g transform="translate(250, 50)">
    <path class="icon-stroke"
          d="M -18,5
             A 7,7 0 0 1 -11,-7
             A 9,9 0 0 1 7,-9
             A 7,7 0 0 1 18,-1
             A 6,6 0 0 1 15,5
             Z"
          fill="var(--lab-bg)"/>
    <text class="header" y="28">INTERNET</text>
  </g>

  <!-- ========== wan-01 (Router - circle + 4 arrows) ========== -->
  <g transform="translate(110, 170)">
    <rect class="device" x="-32" y="-20" width="64" height="40" rx="10"/>
    <g transform="translate(-12, -12)">
      <circle class="icon-accent" cx="12" cy="12" r="3"/>
      <path class="icon-accent" d="M 12 6 L 12 9"/>
      <path class="icon-accent" d="M 10 7.5 L 12 6 L 14 7.5"/>
      <path class="icon-accent" d="M 12 18 L 12 15"/>
      <path class="icon-accent" d="M 10 16.5 L 12 18 L 14 16.5"/>
      <path class="icon-accent" d="M 6 12 L 9 12"/>
      <path class="icon-accent" d="M 7.5 10 L 6 12 L 7.5 14"/>
      <path class="icon-accent" d="M 18 12 L 15 12"/>
      <path class="icon-accent" d="M 16.5 10 L 18 12 L 16.5 14"/>
    </g>
    <text class="label" y="36">wan-01</text>
  </g>

  <!-- ========== wan-02 (Router) ========== -->
  <g transform="translate(390, 170)">
    <rect class="device" x="-32" y="-20" width="64" height="40" rx="10"/>
    <g transform="translate(-12, -12)">
      <circle class="icon-accent" cx="12" cy="12" r="3"/>
      <path class="icon-accent" d="M 12 6 L 12 9"/>
      <path class="icon-accent" d="M 10 7.5 L 12 6 L 14 7.5"/>
      <path class="icon-accent" d="M 12 18 L 12 15"/>
      <path class="icon-accent" d="M 10 16.5 L 12 18 L 14 16.5"/>
      <path class="icon-accent" d="M 6 12 L 9 12"/>
      <path class="icon-accent" d="M 7.5 10 L 6 12 L 7.5 14"/>
      <path class="icon-accent" d="M 18 12 L 15 12"/>
      <path class="icon-accent" d="M 16.5 10 L 18 12 L 16.5 14"/>
    </g>
    <text class="label" y="36">wan-02</text>
  </g>

  <!-- ========== fw-01 (Firewall - brick wall) ========== -->
  <g transform="translate(250, 290)">
    <rect class="device" x="-32" y="-20" width="64" height="40" rx="10"/>
    <g transform="translate(-12, -12)">
      <rect class="icon-stroke" x="3" y="4" width="6" height="4.5"/>
      <rect class="icon-stroke" x="9" y="4" width="6" height="4.5"/>
      <rect class="icon-stroke" x="15" y="4" width="6" height="4.5"/>
      <rect class="icon-stroke" x="3" y="8.5" width="3" height="4.5"/>
      <rect class="icon-stroke" x="6" y="8.5" width="6" height="4.5"/>
      <rect class="icon-stroke" x="12" y="8.5" width="6" height="4.5"/>
      <rect class="icon-stroke" x="18" y="8.5" width="3" height="4.5"/>
      <rect class="icon-stroke" x="3" y="13" width="6" height="4.5"/>
      <rect class="icon-stroke" x="9" y="13" width="6" height="4.5"/>
      <rect class="icon-stroke" x="15" y="13" width="6" height="4.5"/>
    </g>
    <text class="label" y="36">fw-01</text>
  </g>

  <!-- ========== spine-01 (Spine Switch - tall body, 2 status lines) ========== -->
  <g transform="translate(110, 420)">
    <rect class="device" x="-32" y="-20" width="64" height="40" rx="10"/>
    <g transform="translate(-12, -12)">
      <rect class="icon-stroke" x="2" y="5" width="20" height="14" rx="1"/>
      <circle class="accent-fill" cx="5" cy="15.5" r="0.9"/>
      <circle class="accent-fill" cx="8.4" cy="15.5" r="0.9"/>
      <circle class="accent-fill" cx="11.8" cy="15.5" r="0.9"/>
      <circle class="accent-fill" cx="15.2" cy="15.5" r="0.9"/>
      <circle class="accent-fill" cx="18.6" cy="15.5" r="0.9"/>
      <path class="icon-stroke" d="M 5 8.5 L 19 8.5"/>
      <path class="icon-stroke" d="M 5 11.5 L 19 11.5"/>
    </g>
    <text class="label" y="36">spine-01</text>
  </g>

  <!-- ========== spine-02 (Spine Switch) ========== -->
  <g transform="translate(390, 420)">
    <rect class="device" x="-32" y="-20" width="64" height="40" rx="10"/>
    <g transform="translate(-12, -12)">
      <rect class="icon-stroke" x="2" y="5" width="20" height="14" rx="1"/>
      <circle class="accent-fill" cx="5" cy="15.5" r="0.9"/>
      <circle class="accent-fill" cx="8.4" cy="15.5" r="0.9"/>
      <circle class="accent-fill" cx="11.8" cy="15.5" r="0.9"/>
      <circle class="accent-fill" cx="15.2" cy="15.5" r="0.9"/>
      <circle class="accent-fill" cx="18.6" cy="15.5" r="0.9"/>
      <path class="icon-stroke" d="M 5 8.5 L 19 8.5"/>
      <path class="icon-stroke" d="M 5 11.5 L 19 11.5"/>
    </g>
    <text class="label" y="36">spine-02</text>
  </g>

  <!-- ========== leaf-01 (Leaf Switch - shorter body, 1 status line) ========== -->
  <g transform="translate(110, 560)">
    <rect class="device" x="-32" y="-20" width="64" height="40" rx="10"/>
    <g transform="translate(-12, -12)">
      <rect class="icon-stroke" x="3" y="8" width="18" height="9" rx="1"/>
      <circle class="accent-fill" cx="6" cy="13.5" r="0.9"/>
      <circle class="accent-fill" cx="9" cy="13.5" r="0.9"/>
      <circle class="accent-fill" cx="12" cy="13.5" r="0.9"/>
      <circle class="accent-fill" cx="15" cy="13.5" r="0.9"/>
      <circle class="accent-fill" cx="18" cy="13.5" r="0.9"/>
      <path class="icon-stroke" d="M 6 10.5 L 18 10.5"/>
    </g>
    <text class="label" y="36">leaf-01</text>
  </g>

  <!-- ========== leaf-02 (Leaf Switch) ========== -->
  <g transform="translate(390, 560)">
    <rect class="device" x="-32" y="-20" width="64" height="40" rx="10"/>
    <g transform="translate(-12, -12)">
      <rect class="icon-stroke" x="3" y="8" width="18" height="9" rx="1"/>
      <circle class="accent-fill" cx="6" cy="13.5" r="0.9"/>
      <circle class="accent-fill" cx="9" cy="13.5" r="0.9"/>
      <circle class="accent-fill" cx="12" cy="13.5" r="0.9"/>
      <circle class="accent-fill" cx="15" cy="13.5" r="0.9"/>
      <circle class="accent-fill" cx="18" cy="13.5" r="0.9"/>
      <path class="icon-stroke" d="M 6 10.5 L 18 10.5"/>
    </g>
    <text class="label" y="36">leaf-02</text>
  </g>

  <!-- ========== host-01 (Laptop) ========== -->
  <g transform="translate(110, 710)">
    <rect class="device" x="-32" y="-20" width="64" height="40" rx="10"/>
    <rect class="icon-stroke" x="-12" y="-10" width="24" height="14" rx="1.5"/>
    <path class="icon-stroke" d="M -16,8 L 16,8"/>
    <text class="label" y="36">host-01</text>
  </g>

  <!-- ========== host-02 (Laptop) ========== -->
  <g transform="translate(390, 710)">
    <rect class="device" x="-32" y="-20" width="64" height="40" rx="10"/>
    <rect class="icon-stroke" x="-12" y="-10" width="24" height="14" rx="1.5"/>
    <path class="icon-stroke" d="M -16,8 L 16,8"/>
    <text class="label" y="36">host-02</text>
  </g>

</svg>
